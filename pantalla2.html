<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pantalla 2</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="screen-view" data-screen="pantalla2">

  <!-- CONTENIDO DE LA PANTALLA -->
  <main class="screen-layout">

    <!-- ===== ZONA IZQUIERDA (MEDIA) ===== -->
    <section class="media-zone">
      <div class="media-frame">
        <div id="player" class="media-player">
          <p class="empty-msg">Esperando contenido...</p>
        </div>
      </div>
    </section>

    <!-- ===== ZONA DERECHA (CONTADORES) ===== -->
    <aside class="sidebar">
          
      <div class="counter-card">
        <h3>Rendimiento</h3>
        <div class="counter" id="rendimiento">0</div>
      </div>
    
      <div class="counter-card">
        <h3>PPM's</h3>
        <div class="counter" id="ppm">0</div>
      </div>
    
      <div class="counter-card">
        <h3>Disponibilidad</h3>
        <div class="counter" id="disponibilidad">0</div>
      </div>
    
      <div class="counter-card">
        <h3>Tasa de servicio</h3>
        <div class="counter" id="tds">0</div>
      </div>
    
      <div class="counter-card">
        <h3>MTM vs Real</h3>
        <div class="counter" id="mvr">0</div>
      </div>
    
      <div class="counter-card">
        <h3>Core documentos</h3>
        <div class="counter" id="cd">0</div>
      </div>
    
      <div class="counter-card">
        <h3>Hora por hora</h3>
        <div class="counter" id="hph">0</div>
      </div>
      
    </aside>

      <!-- Botón de carga -->
      <div class="screen-controls">
        <label class="upload-btn">
          Subir contenido Pantalla 2
          <input type="file" id="fileInput" accept="image/*,video/*" multiple>
        </label>
        
        <button class="delete-btn" id="deleteContent">
          Eliminar contenido
        </button>
      </div>



    </aside>

  </main>

  <!-- Scripts SIEMPRE al final -->
  <script src="./js/header.js"></script>
  <script src="./js/pantalla.js"></script>

  <!-- Inicializar esta pantalla -->
  <script>
    initPantalla("pantalla2");
  </script>

  <script src="./js/data.js"></script>

</body>
</html>
